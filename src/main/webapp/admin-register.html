<!DOCTYPE html>
<html>
<head><title>Admin Staff Registration</title></head>
<body>
    <h2>Hostel Staff Registration</h2>
    <form action="AdminRegisterServlet" method="POST">
        <label>Create Username:</label><br>
        <input type="text" name="username" required><br><br>
        
        <label>Staff Email:</label><br>
        <input type="email" name="email" required><br><br>
        
        <label>Create Password:</label><br>
        <input type="password" name="password" required><br><br>
        
        <button type="submit">Register Admin</button>
        <br><br>
        <a href="index.html">Already a staff member? Login here</a>
    </form>
</body>
</html>
